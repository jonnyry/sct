<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>sct — SNOMED CT Explorer</title>
<script>
// Apply saved theme before CSS loads to prevent flash
(function(){
  document.documentElement.setAttribute(
    "data-theme",
    localStorage.getItem("sct-theme") || "dark"
  );
})();
</script>
<link href="https://cdn.jsdelivr.net/npm/daisyui@4/dist/full.min.css" rel="stylesheet" type="text/css" />
<script src="https://cdn.tailwindcss.com"></script>
<style>
::-webkit-scrollbar { width: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: oklch(var(--bc)/0.15); border-radius: 99px; }

/* Sidebar list items */
.sidebar-item {
  display: flex;
  align-items: center;
  width: 100%;
  padding: 6px 12px;
  gap: 8px;
  font-size: 13px;
  cursor: pointer;
  border-radius: 6px;
  border: none;
  background: none;
  color: inherit;
  text-align: left;
  transition: background 0.1s;
  overflow: hidden;
}
.sidebar-item:hover { background: oklch(var(--bc)/0.07); }
.sidebar-item.active { background: oklch(var(--p)); color: oklch(var(--pc)); }
.sidebar-item.active .item-meta { color: oklch(var(--pc)/0.55); }

/* Results items stack term + id vertically */
.result-item {
  flex-direction: column;
  align-items: flex-start;
  gap: 1px;
  padding: 7px 12px;
}
.item-label { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; font-weight: 500; line-height: 1.3; }
.item-meta { font-family: monospace; font-size: 11px; color: oklch(var(--bc)/0.4); line-height: 1.3; }
</style>
</head>

<body class="h-screen flex flex-col overflow-hidden bg-base-100 text-base-content">

<!-- ── Navbar ──────────────────────────────────────────────────────────── -->
<div class="navbar bg-primary text-primary-content min-h-12 flex-shrink-0 px-4 shadow-lg z-10">
  <div class="navbar-start items-center gap-2">
    <span class="font-bold text-base tracking-tight">sct</span>
    <span class="badge badge-sm badge-outline border-primary-content/30 text-primary-content/60 font-normal">
      SNOMED CT Explorer
    </span>
  </div>
  <div class="navbar-end">
    <label class="swap swap-rotate btn btn-ghost btn-sm btn-circle text-primary-content/70 hover:text-primary-content">
      <input type="checkbox" id="theme-toggle" />
      <!-- Sun — shown in dark mode, click to go light -->
      <svg class="swap-on h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="5"/>
        <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
        <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
      </svg>
      <!-- Moon — shown in light mode, click to go dark -->
      <svg class="swap-off h-4 w-4" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
           fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
      </svg>
    </label>
  </div>
</div>

<!-- ── Layout ──────────────────────────────────────────────────────────── -->
<div class="flex flex-1 overflow-hidden">

  <!-- Left sidebar -->
  <aside class="w-72 flex-shrink-0 flex flex-col border-r border-base-300 bg-base-200 overflow-hidden">

    <!-- Search -->
    <div class="p-3 flex-shrink-0 border-b border-base-300">
      <div class="relative">
        <div class="absolute inset-y-0 left-3 flex items-center pointer-events-none">
          <svg class="h-3.5 w-3.5 text-base-content/40" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
               fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
          </svg>
        </div>
        <input id="search-input" type="text"
               class="input input-bordered input-sm w-full pl-9 bg-base-100 text-sm"
               placeholder="Search concepts…"
               autocomplete="off" spellcheck="false" />
      </div>
    </div>

    <!-- Hierarchies (fixed height, scrollable) -->
    <div class="flex flex-col border-b border-base-300 flex-shrink-0" style="max-height:220px">
      <div class="px-3 pt-2.5 pb-1 text-xs font-semibold uppercase tracking-widest text-base-content/40 flex-shrink-0">
        Hierarchies
      </div>
      <div class="overflow-y-auto overflow-x-hidden p-1" id="hierarchy-list">
        <div class="flex justify-center py-3">
          <span class="loading loading-spinner loading-xs opacity-40"></span>
        </div>
      </div>
    </div>

    <!-- Results (fills remaining height) -->
    <div class="flex flex-col flex-1 overflow-hidden min-h-0">
      <div class="px-3 pt-2.5 pb-1 text-xs font-semibold uppercase tracking-widest text-base-content/40 flex-shrink-0"
           id="results-title">Results</div>
      <div class="overflow-y-auto overflow-x-hidden flex-1 p-1" id="results-list">
        <div class="text-xs text-base-content/40 text-center py-6 px-3">
          Search above or select a hierarchy
        </div>
      </div>
    </div>

  </aside>

  <!-- Main content -->
  <main class="flex-1 overflow-y-auto p-6 bg-base-100">
    <div id="concept-detail" class="max-w-3xl mx-auto">
      <div class="flex flex-col items-center justify-center h-64 gap-3 text-base-content/30">
        <svg class="h-10 w-10" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <p class="text-base font-medium">Select a concept to view details</p>
        <p class="text-sm">Search by name or browse a hierarchy on the left.</p>
      </div>
    </div>
  </main>

</div>

<script>
"use strict";

// ── Theme ──────────────────────────────────────────────────────────────────
(function () {
  const toggle = document.getElementById("theme-toggle");
  const saved  = localStorage.getItem("sct-theme") || "dark";
  document.documentElement.setAttribute("data-theme", saved);
  toggle.checked = (saved === "dark");
  toggle.addEventListener("change", () => {
    const theme = toggle.checked ? "dark" : "light";
    document.documentElement.setAttribute("data-theme", theme);
    localStorage.setItem("sct-theme", theme);
  });
})();

// ── State ──────────────────────────────────────────────────────────────────
let activeConceptId   = null;
let activeResultEl    = null;
let activeHierarchyEl = null;
let searchTimer       = null;
let navHistory        = [];

// ── Init ───────────────────────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  loadHierarchies();
  const inp = document.getElementById("search-input");
  inp.addEventListener("input", onSearchInput);
  inp.addEventListener("keydown", e => {
    if (e.key === "Escape") { e.target.value = ""; clearResults(); }
  });
});

// ── Hierarchies ────────────────────────────────────────────────────────────
async function loadHierarchies() {
  const el = document.getElementById("hierarchy-list");
  try {
    const data = await apiFetch("/api/hierarchy");
    if (!data.hierarchies || !data.hierarchies.length) {
      el.innerHTML = '<div class="text-xs text-base-content/40 text-center py-4">No hierarchies found</div>';
      return;
    }
    el.innerHTML = "";
    data.hierarchies.forEach(h => {
      const btn = document.createElement("button");
      btn.className = "sidebar-item";
      btn.innerHTML = `<span class="item-label">${esc(h)}</span><span class="item-meta">›</span>`;
      btn.addEventListener("click", () => {
        setActiveHierarchy(btn);
        loadHierarchyConcepts(h);
        document.getElementById("search-input").value = "";
      });
      el.appendChild(btn);
    });
  } catch (e) {
    el.innerHTML = `<div class="text-xs text-error text-center py-4">${esc(e.message)}</div>`;
  }
}

function setActiveHierarchy(el) {
  if (activeHierarchyEl) activeHierarchyEl.classList.remove("active");
  activeHierarchyEl = el;
  el.classList.add("active");
}

async function loadHierarchyConcepts(hierarchy) {
  setResultsTitle(hierarchy);
  setResultsLoading();
  try {
    const data    = await apiFetch(`/api/search?q=${encodeURIComponent(hierarchy)}&limit=100`);
    const results = (data.results || []).filter(r => r.hierarchy === hierarchy);
    renderResults(results, hierarchy);
  } catch (e) {
    setResultsError(e.message);
  }
}

// ── Search ─────────────────────────────────────────────────────────────────
function onSearchInput(e) {
  clearTimeout(searchTimer);
  const q = e.target.value.trim();
  if (!q) { clearResults(); return; }
  searchTimer = setTimeout(() => runSearch(q), 200);
}

async function runSearch(q) {
  setResultsTitle("Results");
  setResultsLoading();
  if (activeHierarchyEl) { activeHierarchyEl.classList.remove("active"); activeHierarchyEl = null; }
  try {
    const data = await apiFetch(`/api/search?q=${encodeURIComponent(q)}&limit=50`);
    renderResults(data.results || [], null, data.total);
  } catch (e) {
    setResultsError(e.message);
  }
}

function clearResults() {
  setResultsTitle("Results");
  document.getElementById("results-list").innerHTML =
    '<div class="text-xs text-base-content/40 text-center py-6 px-3">Search above or select a hierarchy</div>';
  activeResultEl = null;
}

function renderResults(results, _filter, total) {
  const list = document.getElementById("results-list");
  if (!results.length) {
    setResultsTitle("Results (0)");
    list.innerHTML = '<div class="text-xs text-base-content/40 text-center py-6 px-3">No results found</div>';
    return;
  }
  setResultsTitle(`Results (${total !== undefined ? total : results.length})`);
  list.innerHTML = "";
  results.forEach(r => {
    const btn = document.createElement("button");
    btn.className = "sidebar-item result-item";
    if (r.id === activeConceptId) { btn.classList.add("active"); activeResultEl = btn; }
    btn.innerHTML = `
      <span class="item-label">${esc(r.preferred_term)}</span>
      <span class="item-meta">${esc(r.id)}</span>`;
    btn.addEventListener("click", () => {
      setActiveResult(btn);
      loadConcept(r.id);
    });
    list.appendChild(btn);
  });
}

function setActiveResult(el) {
  if (activeResultEl) activeResultEl.classList.remove("active");
  activeResultEl = el;
  el.classList.add("active");
}

// ── Concept detail ─────────────────────────────────────────────────────────
async function loadConcept(id, push) {
  if (push !== false && activeConceptId && activeConceptId !== id) {
    navHistory.push(activeConceptId);
    if (navHistory.length > 20) navHistory.shift();
  }
  activeConceptId = id;
  const panel = document.getElementById("concept-detail");
  panel.innerHTML = '<div class="flex justify-center pt-16"><span class="loading loading-spinner loading-md opacity-30"></span></div>';
  try {
    const c = await apiFetch(`/api/concept/${encodeURIComponent(id)}`);
    if (c.error) {
      panel.innerHTML = `<div class="text-center py-16 text-sm text-base-content/40">${esc(c.error)}</div>`;
      return;
    }
    renderConcept(c, panel);
  } catch (e) {
    panel.innerHTML = `<div class="text-center py-16 text-sm text-base-content/40">Error: ${esc(e.message)}</div>`;
  }
}

function renderConcept(c, panel) {
  const synonyms    = Array.isArray(c.synonyms)       ? c.synonyms       : [];
  const path        = Array.isArray(c.hierarchy_path) ? c.hierarchy_path : [];
  const parents     = Array.isArray(c.parents)        ? c.parents        : [];
  const attrEntries = Object.entries(
    c.attributes && typeof c.attributes === "object" ? c.attributes : {}
  );

  let html = `
    <div class="flex items-start gap-3 mb-1">
      <h1 class="text-xl font-bold flex-1 leading-snug">${esc(c.preferred_term)}</h1>
      ${navHistory.length
        ? `<button onclick="goBack()" class="btn btn-ghost btn-xs shrink-0 mt-0.5 border border-base-300">← back</button>`
        : ""}
    </div>
    <p class="text-sm text-base-content/50 mb-4">${esc(c.fsn)}</p>
    <div class="flex flex-wrap gap-2 mb-6">
      <span class="badge badge-outline font-mono text-xs">${esc(c.id)}</span>
      ${c.hierarchy ? `<span class="badge badge-warning badge-outline text-xs">${esc(c.hierarchy)}</span>` : ""}
      ${c.children_count ? `<span class="badge badge-ghost text-xs">${c.children_count} children</span>` : ""}
    </div>`;

  if (synonyms.length) {
    html += `
    <div class="mb-6">
      <p class="text-xs font-semibold uppercase tracking-widest text-base-content/40 mb-2">Synonyms</p>
      <div class="flex flex-wrap gap-1.5">
        ${synonyms.map(s => `<span class="badge badge-sm badge-ghost">${esc(s)}</span>`).join("")}
      </div>
    </div>`;
  }

  if (path.length) {
    html += `
    <div class="mb-6">
      <p class="text-xs font-semibold uppercase tracking-widest text-base-content/40 mb-2">Hierarchy path</p>
      <div class="breadcrumbs text-sm py-0">
        <ul>
          ${path.map((item, i) => {
            const last = i === path.length - 1;
            return `<li class="${last ? "font-semibold" : "text-base-content/50"}">${esc(item)}</li>`;
          }).join("")}
        </ul>
      </div>
    </div>`;
  }

  if (parents.length) {
    html += `
    <div class="mb-6">
      <p class="text-xs font-semibold uppercase tracking-widest text-base-content/40 mb-2">Parents</p>
      <div class="flex flex-col gap-1.5">
        ${parents.map(p => `
          <div class="flex items-baseline gap-2 flex-wrap">
            <button class="link link-primary text-sm text-left" onclick="loadConcept('${esc(p.id)}')">${esc(p.fsn || p.id)}</button>
            <span class="font-mono text-xs text-base-content/40">${esc(p.id)}</span>
          </div>`).join("")}
      </div>
    </div>`;
  }

  if (attrEntries.length) {
    html += `
    <div class="mb-6">
      <p class="text-xs font-semibold uppercase tracking-widest text-base-content/40 mb-2">Attributes</p>
      <div class="overflow-x-auto rounded-box border border-base-300">
        <table class="table table-sm table-zebra">
          <tbody>
            ${attrEntries.flatMap(([key, vals]) =>
              (Array.isArray(vals) ? vals : []).map(v => `
                <tr>
                  <td class="text-base-content/50 text-xs w-44 whitespace-nowrap align-top pt-2.5">
                    ${esc(key.replace(/_/g, " "))}
                  </td>
                  <td>
                    <button class="link link-primary text-sm text-left" onclick="loadConcept('${esc(v.id)}')">${esc(v.fsn || v.id)}</button>
                    <span class="font-mono text-xs text-base-content/40 ml-1">[${esc(v.id)}]</span>
                  </td>
                </tr>`)
            ).join("")}
          </tbody>
        </table>
      </div>
    </div>`;
  }

  if (c.children_count > 0) {
    html += `
    <div class="mb-6">
      <p class="text-xs font-semibold uppercase tracking-widest text-base-content/40 mb-2">
        Children (${c.children_count})
      </p>
      <div id="children-container">
        <button onclick="loadChildren('${esc(c.id)}')" class="btn btn-sm btn-ghost border border-base-300">
          Show children
        </button>
      </div>
    </div>`;
  }

  panel.innerHTML = html;
}

async function loadChildren(id) {
  const container = document.getElementById("children-container");
  container.innerHTML = '<span class="loading loading-spinner loading-sm opacity-40"></span>';
  try {
    const data     = await apiFetch(`/api/children/${encodeURIComponent(id)}`);
    const children = data.children || [];
    if (!children.length) { container.textContent = "No children found."; return; }
    container.innerHTML = `<div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-2">
      ${children.map(ch => `
        <button onclick="loadConcept('${esc(ch.id)}')"
          class="card card-compact bg-base-200 border border-base-300 hover:border-primary transition-colors cursor-pointer text-left">
          <div class="card-body gap-1 py-3">
            <p class="text-xs font-medium leading-snug">${esc(ch.preferred_term)}</p>
            <p class="font-mono text-xs text-base-content/40">${esc(ch.id)}</p>
          </div>
        </button>`).join("")}
    </div>`;
  } catch (e) {
    container.textContent = `Error: ${e.message}`;
  }
}

function goBack() {
  const id = navHistory.pop();
  if (id) loadConcept(id, false);
}

// ── Helpers ────────────────────────────────────────────────────────────────
function setResultsTitle(t) { document.getElementById("results-title").textContent = t; }

function setResultsLoading() {
  document.getElementById("results-list").innerHTML =
    '<div class="flex justify-center py-6"><span class="loading loading-spinner loading-xs opacity-40"></span></div>';
}

function setResultsError(msg) {
  document.getElementById("results-list").innerHTML =
    `<div class="text-xs text-error text-center py-4">${esc(msg)}</div>`;
}

async function apiFetch(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function esc(s) {
  if (s == null) return "";
  return String(s)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;")
    .replace(/'/g, "&#39;");
}
</script>
</body>
</html>
